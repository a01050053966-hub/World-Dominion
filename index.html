<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Dominion</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    select {
      padding: 8px;
      font-size: 16px;
    }

    #game {
      display: none;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <div id="menu">
    <h1>🌍 World Dominion</h1>
    <p>나라를 선택하고 세계를 지배하라</p>

    <select id="countrySelect">
      <option value="Korea">Korea</option>
      <option value="USA">USA</option>
      <option value="Japan">Japan</option>
      <option value="Germany">Germany</option>
    </select>

    <br><br>
    <button onclick="startGame()">게임 시작</button>
  </div>

  <!-- GAME -->
  <div id="game">
    <h1>전략 화면</h1>

    <h2 id="countryName"></h2>

    <p>💰 돈: <span id="money">0</span></p>
    <p>⚔️ 군사력: <span id="power">10</span></p>

    <button onclick="earnMoney()">돈 생산</button>
    <button onclick="attack()">전쟁</button>
    <button onclick="upgrade()">군사 강화</button>
  </div>

  <script>
    let money = 0;
    let power = 10;
    let country = "";

    function startGame() {
      country = document.getElementById("countrySelect").value;

      document.getElementById("menu").style.display = "none";
      document.getElementById("game").style.display = "block";

      document.getElementById("countryName").innerText = "국가: " + country;

      updateUI();
    }

    function earnMoney() {
      money += 10;
      updateUI();
    }

    function upgrade() {
      if (money >= 20) {
        money -= 20;
        power += 5;
      } else {
        alert("돈 부족");
      }
      updateUI();
    }

    function attack() {
      let enemy = Math.floor(Math.random() * 20);

      if (power > enemy) {
        money += 30;
        alert("승리!");
      } else {
        money -= 10;
        alert("패배...");
      }

      updateUI();
    }

    function updateUI() {
      document.getElementById("money").innerText = money;
      document.getElementById("power").innerText = power;
    }
  </script>

</body>
</html>
